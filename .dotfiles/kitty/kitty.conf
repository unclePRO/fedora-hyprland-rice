# ===========================================
# CHRONOSYNC ULTRA GLASS effect fr
# ===========================================

# Font (crisp + matching Waybar)
font_family      JetBrainsMono Nerd Font Mono
font_size        13.5

# ULTRA GLASS
background_opacity       0.78
dynamic_background_opacity yes
window_padding_width     16
window_margin_width      12
window_background_opacity 0.82

# blur effect
background_blur          32
dynamic_color            yes

# cursor
cursor           #ff4b6e
cursor_text_color #ffe6ea
cursor_shape     block
cursor_blink_interval 0.4
cursor_stop_blinking_after 0.3

# GLASS tabs (Waybar style)
active_tab_background     #ff4b6e
active_tab_foreground     #120408
active_tab_font_style     bold
inactive_tab_background   #1b050c
inactive_tab_foreground   #b57682
tab_bar_style             powerline
tab_powerline_style       angled
tab_font_style            bold

# Smooth scrolling
scrollback_lines 10000
wheel_scroll_multiplier 1.2

# Keybinds
map ctrl+shift+f5 reload_config
map ctrl+shift+t  new_tab  
map ctrl+shift+Enter new_window
map ctrl+shift+l  next_tab

# URL glow (yellow accent)
url_color        #ffbd5a
url_style        curly

# Glass window separators
window_border_width 1
window_border_color #ff4b6e60

# Include theme colors
include           ./chronosync-glass.conf
